<!DOCTYPE html>
<html>
<head>
    <title>View Students - Smart Attendance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav>
        <ul>
            <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
            <li><a href="{{ url_for('upload_students') }}">Upload Students</a></li>
            <li><a href="{{ url_for('view_students') }}">View Students</a></li>
            <li><a href="{{ url_for('attendance.take_attendance') }}">Take Attendance</a></li>
            <li><a href="{{ url_for('attendance.get_attendance') }}">View Attendance</a></li>
            <li><a href="{{ url_for('attendance_details') }}">Attendance Details</a></li>
            <li><a href="{{ url_for('help') }}">Help</a></li>
            <li><a href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>View Student Details</h2>
        
        <div class="view-section">
            <form id="viewForm">
                <div class="form-group">
                    <label>Select Branch:</label>
                    <select name="branch" id="branch" required>
                        <option value="">Select Branch</option>
                        <option value="AIML">Artificial Intelligence and Machine Learning</option>
                        <option value="CSE">Computer Science and Engineering</option>
                        <option value="ECE">Electronics and Communications</option>
                        <option value="ISE">Information Science</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Select Section:</label>
                    <select name="section" id="section" required>
                        <option value="">Select Section</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Select Semester:</label>
                    <select name="semester" id="semester" required>
                        <option value="">Select Semester</option>
                        {% for sem in semesters %}
                            <option value="{{ sem }}">{{ sem }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="button" onclick="viewStudents()">View Students</button>
                <button type="button" onclick="deleteStudentFile()" class="delete-btn">Delete File</button>
            </form>
        </div>

        <div class="students-list" id="studentsList" style="display: none;">
            <h3>Student List</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>USN</th>
                        <th>Branch</th>
                        <th>Section</th>
                        <th>Semester</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentsTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            function updateSections() {
                var branch = $('#branch').val();
                $.getJSON('/get_sections/' + branch, function(data) {
                    var section = $('#section');
                    section.empty();
                    section.append('<option value="">Select Section</option>');
                    $.each(data.sections, function(index, value) {
                        section.append('<option value="' + value + '">' + value + '</option>');
                    });
                });
            }

            $('#branch').change(updateSections);
        });

        function viewStudents() {
            var branch = $('#branch').val();
            var section = $('#section').val();
            var semester = $('#semester').val();

            if (!branch || !section || !semester) {
                alert('Please select all filters');
                return;
            }

            $.getJSON('/get_students', {
                branch: branch,
                section: section,
                semester: semester
            }, function(response) {
                if (response.success) {
                    var tbody = $('#studentsTableBody');
                    tbody.empty();
                    
                    response.students.forEach(function(student) {
                        var row = '<tr>' +
                            '<td>' + student.name + '</td>' +
                            '<td>' + student.usn + '</td>' +
                            '<td>' + student.branch + '</td>' +
                            '<td>' + student.section + '</td>' +
                            '<td>' + student.semester + '</td>' +
                            '<td>' + student.email + '</td>' +
                            '<td>' + student.phone + '</td>' +
                            '<td>' +
                            '<a href="' + student.image_url + '" target="_blank">View Image</a> ' +
                            '<a href="' + student.voice_url + '" target="_blank">Play Voice</a>' +
                            '</td>' +
                            '</tr>';
                        tbody.append(row);
                    });
                    
                    $('#studentsList').show();
                }
            });
        }

        function deleteStudentFile() {
            var branch = $('#branch').val();
            var section = $('#section').val();
            var semester = $('#semester').val();

            if (!branch || !section || !semester) {
                alert('Please select branch, section, and semester');
                return;
            }

            if (confirm('Are you sure you want to delete this file? This action cannot be undone.')) {
                $.post('/delete_file', {
                    branch: branch,
                    section: section,
                    semester: semester
                }, function(response) {
                    if (response.success) {
                        alert('File deleted successfully');
                        location.reload();
                    } else {
                        alert('Error deleting file');
                    }
                });
            }
        }
    </script>
</body>
</html>
